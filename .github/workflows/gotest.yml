name: Go Test

on:
    push:
      branches: [dev, release/**]
    pull_request:
      branches: [main, dev, release/**]
  
jobs:
    go-test:
        name: Go Test
        permissions:
          contents: read
          packages: read
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v6
        
        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: '1.26.1'

        - name: Run tests
          run: go test -short ./...