host: 0.0.0.0
port: 8080
cors_allowed_origins:
  - "*"
cors_allowed_methods:
  - "GET"
  - "HEAD"
  - "POST"
  - "OPTIONS"
cors_allowed_headers:
  - "Origin"
  - "Content-Type"
  - "Accept"
  - "X-API-Key"
cors_max_age: 600
chain_name: gnoland
# List of CIDR blocks whose X-Forwarded-For / X-Real-Ip headers are trusted for real-IP resolution.
# trusted_proxies:
# - "127.0.0.1/32"
# - "192.168.1.1/32"
# - "10.0.0.1/32"
# Disable if you plan to run it with your own dedicated RPC or if you are just testing/developing.
disable_rate_limit: false

# Rate limiting: requests per minute for unauthenticated (IP-based) access
ip_rpm_limit: 30
# How often to refresh the API key cache from PostgreSQL
key_refresh_interval: 5m
